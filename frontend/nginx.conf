server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets (JS/CSS chunks) — safe to cache forever
  location ~* ^/assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Service worker — NEVER cache; browser must always re-fetch to detect updates
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Workbox runtime chunks (also generated by vite-plugin-pwa)
  location ~* workbox- {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # index.html and everything else — no cache (SPA entry point must always be fresh)
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
